<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجرك الإلكتروني</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- شاشة تسجيل الدخول وإنشاء الحساب -->
    <div id="auth-screen">
        <div class="auth-box">
            
            <!-- نموذج تسجيل الدخول -->
            <div id="login-form">
                <h2>تسجيل الدخول</h2>
                <input type="email" id="login-email" placeholder="البريد الإلكتروني">
                <input type="password" id="login-password" placeholder="كلمة المرور">
                <button onclick="handleLogin()">دخول</button>
                <div class="auth-links">
                    <a href="#" onclick="toggleAuth('signup')">إنشاء حساب جديد</a>
                    <a href="#" onclick="resetPassword()">نسيت كلمة المرور؟</a>
                </div>
            </div>

            <!-- نموذج إنشاء حساب جديد (مخفي مبدئياً) -->
            <div id="signup-form" style="display:none;">
                <h2>إنشاء حساب جديد</h2>
                <input type="text" id="signup-name" placeholder="اسم المستخدم">
                <input type="email" id="signup-email" placeholder="البريد الإلكتروني">
                <input type="password" id="signup-password" placeholder="كلمة المرور">
                <button onclick="handleSignUp()">إنشاء الحساب</button>
                <div class="auth-links">
                    <a href="#" onclick="toggleAuth('login')">لديك حساب بالفعل؟ سجل دخول</a>
                </div>
            </div>

        </div>
    </div>

    <!-- التطبيق الرئيسي (يظهر فقط بعد الدخول) -->
    <div id="app-container" style="display:none;">
        <div id="sidebar">
            <div class="profile-area">
                <h3 id="user-display-name">زائر</h3>
                <p id="user-role-display" class="user-role">مستخدم</p>
                <div id="user-balance" class="balance">$ 0</div>
            </div>
            <button onclick="logout()" class="logout-btn">تسجيل خروج</button>
        </div>

        <div id="main-content">
            
            <!-- 1. لوحة المدير -->
            <div id="admin-panel" class="role-panel" style="display:none;">
                <h2>لوحة تحكم المدير</h2>
                <div class="section">
                    <label>اسم المتجر:</label> <input type="text" id="store-name">
                    <button onclick="saveStoreSettings()">حفظ الاسم</button>
                </div>
                <div class="section">
                    <label>طلبات شحن الرصيد (موافقة / رفض):</label>
                    <div id="admin-topups"></div>
                </div>
                <div class="section">
                    <label>إدارة المستخدمين (حظر، تعيين مشرف):</label>
                    <div id="users-list"></div>
                </div>
            </div>

            <!-- 2. لوحة معاون المدير -->
            <div id="coadmin-panel" class="role-panel" style="display:none;">
                <h2>لوحة تحكم معاون المدير</h2>
                <div class="section">
                    <label>طلبات شحن الرصيد (موافقة / رفض):</label>
                    <div id="coadmin-topups"></div>
                </div>
            </div>

            <!-- 3. لوحة المشرف -->
            <div id="supervisor-panel" class="role-panel" style="display:none;">
                <h2>لوحة تحكم المشرف</h2>
                <div class="section">
                    <label>إضافة منتج جديد:</label>
                    <input type="text" id="prod-name" placeholder="اسم المنتج">
                    <input type="number" id="prod-price" placeholder="السعر">
                    <input type="file" id="prod-img">
                    <button onclick="addProduct()">إضافة المنتج</button>
                </div>
                <div class="section">
                    <label>منتجاتي (تعديل الأسعار):</label>
                    <div id="my-products-list"></div>
                </div>
            </div>

            <!-- 4. لوحة المستخدم العادي -->
            <div id="user-panel" class="role-panel" style="display:none;">
                <h2>صفحة المتجر</h2>
                <div class="section" id="shop-products"></div>
                
                <div class="section">
                    <label>إضافة رصيد (شام كاش):</label>
                    <input type="number" id="topup-amount" placeholder="المبلغ">
                    <button onclick="sendTopup()">طلب شحن</button>
                </div>
            </div>

        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
